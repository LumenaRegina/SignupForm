<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up Form</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Unica+One&display=swap");
    </style>
  </head>
  <body>
    <div class="body">
      <div class="img_sidepanel">
        <div class="logo_banner">LOGO</div>
        <p class="credit">PICTURE BY MYSELF</p>
      </div>
      <div class="form_panel">
        <div class="callToAction">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams. Sign up
            <i>now</i> to get started.
          </p>
          <p>You <i>know</i> you want to.</p>
        </div>
        <form id="userdata">
          <fieldset>
            <legend>Let's do this!</legend>
            <div class="input_combo">
              <label for="firstName">FIRST NAME</label>
              <input type="text" for="firstName" id="firstName" />
            </div>
            <div class="input_combo">
              <label for="lastName">LAST NAME</label>
              <input type="text" name="lastName" id="lastName" />
            </div>
            <div class="input_combo">
              <label for="userMail">EMAIL</label>
              <input type="email" name="userMail" id="userMail" />
            </div class="input_combo">
            <div class="input_combo">
              <label for="userPhoneNr">PHONE NUMBER</label>
              <input type="tel" name="userPhoneNr" id="userPhoneNr" />
            </div>
            <div class="input_combo">
              <label for="userPassword">PASSWORD</label>
              <input type="password" name="userPassword" id="userPassword" required/>
            </div>
            <div class="input_combo">
              <label for="confirmPassword">CONFIRM PASSWORD</label>
              <input
                type="password"
                name="confirmPassword"
                id="confirmPassword"
                required
              />
            </div>
          </fieldset>
        </form>
        <div class="submit_panel">
          <button form="userdata" class="btn_submit" type="submit">Create Account</button>
          <p>Already have an account? <a href="index.html">Log in</a></p>
        </div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
